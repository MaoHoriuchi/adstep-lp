function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => {if (e.isIntersecting) {e.target.classList.add('in');io.unobserve(e.target);}});
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ---------- Tweaks ---------- */
function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;
  return (
    <div className="tweak-panel">
      <div className="row"><span style={{ color: 'var(--ink-dim)' }}>PALETTE</span></div>
      <div className="row">
        <span>Color</span>
        <div className="swatches">
          {Object.entries(ACCENTS).map(([k, v]) =>
          <button key={k} className={`sw ${state.accent === k ? 'on' : ''}`}
          style={{ background: `linear-gradient(135deg, ${v.sky} 50%, ${v.sun} 50%)` }}
          onClick={() => setState((s) => ({ ...s, accent: k }))} />
          )}
        </div>
      </div>
    </div>);

}

/* ---------- App ---------- */
function App() {
  const [state, setState] = useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = useState(false);
  useReveal();

  useEffect(() => {
    const a = ACCENTS[state.accent] || ACCENTS.default;
    document.documentElement.style.setProperty('--sky', a.sky);
    document.documentElement.style.setProperty('--sky-deep', a.deep);
    document.documentElement.style.setProperty('--sky-soft', a.soft);
    document.documentElement.style.setProperty('--sun', a.sun);
    document.documentElement.style.setProperty('--grass', a.grass);
  }, [state]);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOn(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
  }, [state]);

  return (
    <div data-screen-label="AdStep Site">
      <Nav />
      <Hero />
      <Concept />
      <About />
      <Timeline />
      <Gallery />
      <Events />
      <Voices />
      <Join />
      <Founder />
      <Footer />
      <TweaksPanel state={state} setState={setState} visible={tweaksOn} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
